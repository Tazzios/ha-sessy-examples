mode: single
max_exceeded: silent

blueprint:
  name: Sessy X range on the Meter
  description: >
    Control a Sessy Battery according to a grid sensor

    **Version: 2.0**

    New: setpoint template  

    New: start condition

    Improved: Blueprint setup reordered inputs and collapsed sections

    Improved: code, split max difference and absolute limit

  author: Tazzios
  domain: automation
  input:
    battery_section:
      name: Battery selection
      icon: mdi:battery-plus-variant
      input:
        battery_device:
          name: Batteries
          description: Batteries to control
          default: null
          selector:
            device:
              filter:
                integration: sessy
              multiple: true
        battery_soc_min:
          name: Minimum State of Charge
          description: Batteries below this level will not participate with discharging.
          default: 0
          selector:
            number:
              min: 0
              max: 50
              unit_of_measurement: "%"
        battery_soc_max:
          name: Maximum State of Charge
          description: Batteries above this level will not participate  with charging.
          default: 100
          selector:
            number:
              min: 50
              max: 100
              unit_of_measurement: "%"

    rotation_section:
      name: Rotation method
      description: ""
      icon: mdi:rotate-right
      collapsed: true
      input:
        sort_by_soc:
          name: Order by State of Charge
          description: order the batteries by State of Charge and keep the SOC difference between set percentages. **Below 5 means off**, then the Priority offset template will be applied.
          default: 10
          selector:
            number:
              min: 1
              max: 50
              unit_of_measurement: "%"
        priority_offset_template:
          name: Priority offset template
          description: Template defining a value to rotate battery priority by. Values higher than the number of batteries will loop back to 0.
          default: "{{ now().timetuple().tm_yday }}"
          selector:
            template:

    power_section:
      name: Power settings
      description: ""
      icon: mdi:flash
      collapsed: true
      input:
        battery_optimal_min:
          name: Battery Minimum power
          description: Minimum power for a single battery to start with charge or discharge.
          default: 20
          selector:
            number:
              min: 0
              max: 2200
              unit_of_measurement: "Watt"
        battery_optimal_balancing:
          name: Max optimal power
          description: Amount of power required before loadbalancing between batteries
          default: 1600
          selector:
            number:
              min: 50
              max: 2200
              unit_of_measurement: "Watt"
        battery_optimal_max:
          name: Battery maximum power
          description: Maximum power that a single battery is allowed for charge or discharge.
          default: 2200
          selector:
            number:
              min: 50
              max: 2200
              unit_of_measurement: "Watt"
        # This value represents the minimum(aka charging) total setpoint for all batteries combined.
        # It will be inverted later in the blueprint to calculate 'min_setpoint' for logic.
        setpoint_min:
          name: Maximum charging
          description: Total charging power for all batteries combined. If this is 0, charging is disabled.
          default: 12000
          selector:
            number:
              min: 0
              max: 12000
              mode: box
              unit_of_measurement: "Watt"
        setpoint_max:
          name: Maximum discharging
          description: Total discharging power for all batteries combined.If this is 0, discharging is disabled.
          default: 12000
          selector:
            number:
              min: 0
              max: 12000
              mode: box
              unit_of_measurement: "Watt"

    setpoint_section:
      name: Setpoint
      description: This section shows the grid inputs that determine the battery setpoints.
      icon: mdi:gauge
      input:
        grid_entity:
          name: Grid
          description: Entity measuring net grid
          default: null
          selector:
            entity:
              filter:
                domain: sensor
                device_class: power
        setpoint_target_min:
          name: Grid target minimum value
          description: Lower limit for the Grid target band (in Watts). You can create a deadband (-50 and 50). Set them the same if you want a fixed target. High value for charging and negative value for discharging.
          default: -200
          selector:
            number:
              min: -10000
              max: 5000
              mode: box
              unit_of_measurement: "Watt"
        setpoint_target_max:
          name: Grid target maximum value
          description: Upper limit for the Grid target band (in Watts)
          default: 200
          selector:
            number:
              min: -5000
              max: 10000
              mode: box
              unit_of_measurement: "Watt"

    setpoint_advanced_section:
      name: Advanced setpoint settings
      description: Options to adjust or override the setpoint.
      icon: mdi:pencil-ruler
      collapsed: true
      input:
        offset_entity:
          name: Offset entities
          description: Entities whose value (in Watts) should be subtracted from the grid sensor. E.g. Car charger power sensor
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain:
                  - sensor
                  - number
                  - input_number
        setpoint_template:
          name: setpoint template
          description: Custom code to change the setpoint for the batteries.
          default: "{{ corrected_net_load }}"
          selector:
            template:

    smooth_section:
      name: smoothing
      description: Various options to control setpoint smoothing.
      icon: mdi:waves
      collapsed: true
      input:
        smoothing_min_watts:
          name: Minimum differents
          description: Hysteresis, minimum difference (in watts) between the previous and new setpoints. This value should not be lower than the minimum power of a single battery.
          default: 25
          selector:
            number:
              min: 0
              max: 500
              unit_of_measurement: "Watt"
        smoothing_max_watts:
          name: Maximum differents
          description: Maximum difference between the previous and new setpoints
          default: 2000
          selector:
            number:
              min: 50
              max: 10000
              unit_of_measurement: "Watt"
        smoothing_above:
          name: Smoothing above
          description: Apply smoothing only when the setpoint rises above this value.
          default: 1000
          selector:
            number:
              min: 0
              max: 5000
              unit_of_measurement: "Watt"
        smoothing_factor:
          name: smoothing factor
          description: Scales the change between setpoints. Example; old setpoint 1500 new 500 and factor 0.7. The differents 1500-500= 1000*0.7=700 new setpoint will be 1500-700=800. Set to 1 to disable.
          default: 0.7
          selector:
            number:
              step: 0.01
              min: 0.01
              max: 1
        smoothing_factor_zero:
          name: smoothing factor when passing zero
          description: This smoothing factor is used when the setpoint crosses zero. Lower values can help to prevent switching between charge and discharge. Set to 1 to disable.
          default: 0.3
          selector:
            number:
              step: 0.01
              min: 0.01
              max: 1

    script_section:
      name: Script options
      icon: mdi:cog
      collapsed: true
      input:
        start_condition:
          name: Start conditions
          description: "Optional conditions that must be met before this automation starts. "
          default: []
          selector:
            condition:
        stop_action_script:
          name: Stop action
          description: "Behavior when start conditions are not met. Be aware: choosing ‘do not run the script’ keeps the last battery setpoint unchanged."
          default: "Run script with setpoint 0"
          selector:
            select:
              mode: dropdown
              options:
                - "Run script with setpoint 0"
                - "Do not run the script"
        stop_action_additional:
          name: Additional stop actions
          description: "Optional actions when start conditions are not met. Examples: send a notification, add a delay before run again, stop the automation, start another automation."
          default: []
          selector:
            action:
        update_interval:
          name: Update interval
          description: Time to wait before processing new grid sensor readings.
          default:
            seconds: 10
          selector:
            duration: {}
        debug:
          name: Debug log
          description: Include variables in the execution trace.
          default: false
          selector:
            boolean: {}

variables:
  # Batttery selection
  device_ids: !input battery_device
  min_battery_level: !input battery_soc_min
  max_battery_level: !input battery_soc_max

  # Battery rotation
  priority_offset_template: !input priority_offset_template
  sort_by_soc: !input sort_by_soc

  # Power
  min_battery_power: !input battery_optimal_min
  balancing_battery_power: !input battery_optimal_balancing
  max_battery_power: !input battery_optimal_max
  # This makes 'min_setpoint' the opposite (negative) of the configured minimum setpoint.
  # For example: if setpoint_min = 12000 → min_setpoint = -12000
  setpoint_min: !input setpoint_min
  min_setpoint: >
    {{ 0 - (setpoint_min | float) }}
  max_setpoint: !input setpoint_max
  # Target
  grid_entity: !input grid_entity
  offset_entity: !input offset_entity
  # input offset_template is direcly used

  # Setpoint
  target_min: !input setpoint_target_min
  target_max: !input setpoint_target_max

  #smoothing
  smoothing_min_watts: !input smoothing_min_watts
  smoothing_max_watts: !input smoothing_max_watts
  smoothing_above: !input smoothing_above
  smoothing_factor: !input smoothing_factor
  smoothing_factor_zero: !input smoothing_factor_zero

  # Script
  start_condition: !input start_condition
  stop_action_script: !input stop_action_script
  stop_action_additional: !input stop_action_additional
  debug: !input debug

trigger:
  - trigger: state
    entity_id: !input grid_entity

  - trigger: homeassistant
    event: start

action:
  - variables:
      # Get grid power and convert to Watts
      grid: >
        {% set multiplier = 0 %} 
        {% set grid_unit = state_attr(grid_entity, "unit_of_measurement") %}
        {% if grid_unit == "W" %}
          {% set multiplier = 1 %}
        {% elif grid_unit == "kW" %}
          {% set multiplier = 1000 %}
        {% endif %}
        {% set grid_power = states(grid_entity) | float %}
        {{ grid_power * multiplier }}

      # Calculate offset
      offset_total: >
        {{ (offset_entity if offset_entity is iterable else [offset_entity] | default([])) 
        | map('states') 
        | map('int', 0) 
        | sum }}

      # Count all actueel delivered power of the batteries together
      Battery_ac_power_total: >
        {% set total_ac_power = namespace(value=0) %}

        {% for dev in device_ids %}
          {% set ac_entity = device_entities(dev) | select("search","_power_setpoint$") | list %}
          {% if ac_entity %}
            {% set ac_value = states(ac_entity[0]) | float(0) %}
            {% set total_ac_power.value = total_ac_power.value + ac_value %}
          {% endif %}
        {% endfor %}

        {{ total_ac_power.value }}

      # setpoint
      setpoint: >
        {{ 0 }}

  # start_condition false with hard stop, setpoint 0 stop is implicit
  - choose:
      - conditions:
          - condition: not
            conditions:
              - condition: or
                conditions:
                  # No start_condition set
                  - condition: template
                    value_template: "{{ start_condition is none }}"
                  # start_condition is true
                  - condition: !input start_condition
        sequence:
          # Execute custom actions if defined
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ stop_action_additional is not none and stop_action_additional != [] }}"
                sequence: !input stop_action_additional
          # Handle stop_action option
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ stop_action == 'Do not run the script' }}"
                sequence:
                  - stop: "Stopped by stop_action"
  # start_condition true
  - choose:
      - conditions:
          - condition: or
            conditions:
              # No start_condition set
              - condition: template
                value_template: "{{ start_condition is none }}"
              # start_condition is true
              - condition: !input start_condition

        sequence:
          - variables:
              corrected_net_load: >
                {% set net_load = Battery_ac_power_total + grid %}
                {{ net_load - offset_total }}
              setpoint_template: !input setpoint_template
              setpoint: >
                {# set net_load = Battery_ac_power_total + grid #}
                {# set corrected_net_load = net_load - offset_total #}


                {# --- apply offset template if valid ---#}
                {% set corrected_net_load = setpoint_template | float(corrected_net_load) %}


                {# --- determine target setpoint ---- #}
                {% set target = 0 %}
                {% if corrected_net_load < target_min %}
                  {# te veel export -> laad batterij #}
                  {% set target = corrected_net_load  - target_min %}
                {% elif corrected_net_load > target_max %}
                  {# te veel import -> ontlaad batterij #}
                  {% set target = corrected_net_load - target_max %}
                {% endif %}


                {# --- minimal difference --- #}
                {% if (target - Battery_ac_power_total) | abs < smoothing_min_watts %}
                  {% set raw_setpoint = Battery_ac_power_total %}
                {% else %}
                  {% set raw_setpoint = target %}
                {% endif %}

                {# --- maximal difference --- #}
                {% set raw_setpoint = [raw_setpoint, (Battery_ac_power_total - smoothing_max_watts)] | max %}
                {% set raw_setpoint = [raw_setpoint, (Battery_ac_power_total + smoothing_max_watts)] | min %}


                {# --- absolute limits --- #}
                {% set raw_setpoint = [raw_setpoint, min_setpoint] | max %}
                {% set raw_setpoint = [raw_setpoint, max_setpoint] | min %}


                {# --- crossing zero detection and smoothing --- #}
                {% if (raw_setpoint > 0 and Battery_ac_power_total < 0) or  (raw_setpoint < 0 and Battery_ac_power_total > 0) %}
                  {% set sf = smoothing_factor_zero  %}
                {% elif raw_setpoint > smoothing_above %}
                  {% set sf = smoothing_factor %} 
                {% else %}
                  {% set sf = 1 %} {# --- No smoothing below threshold --- #}
                {% endif %}

                {# --- exponential smoothing --- #}
                {% set setpoint_smooth = sf * raw_setpoint + (1 - sf) * Battery_ac_power_total %}

                {{ setpoint_smooth | round(0) }}


  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debug }}"
        sequence:
          - service: logbook.log
            data:
              name: "Debug"
              message: >
                grid: {{ grid }}
                offset_total: {{ offset_total }}
                Battery_ac_power_total: {{ Battery_ac_power_total }}
                setpoint: {{ setpoint }}

  # order devices
  - variables:
      device_ids: >
        {% if device_ids is string %}
            {% set device_ids = [ device_ids ] %}
          {% else %}
            {% set device_ids = device_ids %}
        {% endif %}

        {% if sort_by_soc >= 5  %}
          {% set soc_map = namespace(list=[]) %}
          {% for dev in device_ids %}
            {% set soc_entity = device_entities(dev) | select("search", "_state_of_charge$") | list %}
            {% if soc_entity %}
              {% set soc_value = states(soc_entity[0]) | int %}
              {% if setpoint < 0 %}
                {# charge roundup #}
                {% set soc_rounded = ((soc_value + sort_by_soc) // sort_by_soc) * sort_by_soc %}
              {% else %}
                {# Discharge round down #}
                {% set soc_rounded = ((soc_value -1) // sort_by_soc) * sort_by_soc %}
              {% endif %}
                {% set soc_map.list = soc_map.list + [[soc_rounded, dev]] %}
              {% endif %}
          {% endfor %}
          
          {% if setpoint < 0 %} 
            {{ soc_map.list | sort(attribute=0) | map('last') | list }}
          {% else %}
            {{ soc_map.list | sort(attribute=0, reverse=True) | map('last') | list }}
          {% endif %}
        {% else %}
          {{ device_ids }}
        {% endif %}

      battery_count: >
        {{ device_ids | count }}

      priority_offset: >
        {% if sort_by_soc < 5 %}
            {{ priority_offset_template % battery_count }}
        {% else%}    
            {{ 0 }}
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debug }}"
        sequence:
          - service: logbook.log
            data:
              name: "Debug"
              message: >
                device_ids: {{ device_ids }}
                battery_count: {{ battery_count }}
                priority_offset: {{ priority_offset }}
  # Battery entities into an array
  - variables:
      # Get Entity IDs from device IDs
      battery_strategy_entity: |
        {% set entities = namespace(strategy=[]) %}
        {% for device_id in device_ids %}
        {% set entities.strategy = entities.strategy + [device_entities(device_id) | list | select("search","_power_strategy$") | list | join("")] %}
        {% endfor %}
        {{ entities.strategy[priority_offset:] + entities.strategy[:priority_offset] }}
      battery_setpoint_entity: |
        {% set entities = namespace(setpoint=[]) %}
        {% for device_id in device_ids %}
        {% set entities.setpoint = entities.setpoint + [device_entities(device_id) | list | select("search","_power_setpoint$") | list | join("")] %}
        {% endfor %}
        {{ entities.setpoint[priority_offset:] + entities.setpoint[:priority_offset] }}
      battery_soc_entity: |
        {% set entities = namespace(soc=[]) %}
        {% for device_id in device_ids %}
        {% set entities.soc = entities.soc + [device_entities(device_id) | list | select("search","_state_of_charge$") | list | join("")] %}
        {% endfor %}
        {{ entities.soc[priority_offset:] + entities.soc[:priority_offset] }}
      battery_state_entity: |
        {% set entities = namespace(state=[]) %}
        {% for device_id in device_ids %}
        {% set entities.state = entities.state + [device_entities(device_id) | list | select("search","_system_state$") | list | join("")] %}
        {% endfor %}
        {{ entities.state[priority_offset:] + entities.state[:priority_offset] }}

  - variables:
      # Distribute setpoint across batteries
      battery_setpoints: |
        {% set num_optimal = ((setpoint | abs) / balancing_battery_power) | round(0,'ceil') %}
        {% set batteries = namespace(entities=[], available=[], standby=[]) %}

        {% for i in range(0,battery_count) %}
          {% if batteries.available | count < num_optimal 
          and states(battery_strategy_entity[i]) == "api"
          and states(battery_state_entity[i]) != "error"
          and (states(battery_soc_entity[i]) | int >= min_battery_level or setpoint < 0)
          and (states(battery_state_entity[i]) != "battery_empty" or setpoint < 0)
          and (states(battery_soc_entity[i]) | int <= max_battery_level or setpoint > 0) 
          and (states(battery_state_entity[i]) != "battery_full" or setpoint > 0) %}
            {% set batteries.available = batteries.available + [i] %}
          {% else %}
            {% set batteries.standby = batteries.standby + [i] %}
          {% endif %}
          
        {% endfor %}
        {% for i in batteries.available %}
          {% set value = (setpoint / (batteries.available | count)) | int %}
          {% set value = [[value,-max_battery_power] | max, max_battery_power] | min %}
          {% if value | abs < min_battery_power %}
            {% set value = 0 %}
          {% endif %}
          {% set batteries.entities = batteries.entities + [{"setpoint":battery_setpoint_entity[i], "strategy": battery_strategy_entity[i], "value":value}] %}

        {% endfor %}
        {% for i in batteries.standby %}
          {% set batteries.entities = batteries.entities + [{"setpoint":battery_setpoint_entity[i], "strategy": battery_strategy_entity[i], "value":0}] %}
        {% endfor %}
        {{ batteries.entities }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debug }}"
        sequence:
          - service: logbook.log
            data:
              name: "Debug"
              message: >
                battery_setpoints: {{ battery_setpoints }}

  - repeat:
      for_each: |
        {{ battery_setpoints }}
      sequence:
        - if:
            - condition: template
              value_template: |
                {{ states(repeat.item.strategy) == "api" }}
          then:
            - action: number.set_value
              continue_on_error: true
              target:
                entity_id: |
                  {{ repeat.item.setpoint }}
              data:
                value: |
                  {{ repeat.item.value | int }}
  - delay: !input update_interval
